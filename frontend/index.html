<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950 select-none">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Grill 6 - Panel de Control Interno</title>
    <!-- El archivo CSS de Tailwind se procesará mediante Vite -->
    <link rel="stylesheet" href="/src/style.css">
    <style>
        /* Scrollbar personalizado estético para conservar la inmersión de House Grill */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #020617; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #991b1b; /* Rojo quemado para el scroll */
            border-radius: 9999px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #dc2626; 
        }
    </style>
</head>
<body class="h-full bg-slate-950 text-slate-100 antialiased flex overflow-hidden">

    <!-- SIDEBAR FIJO CON ESTÉTICA HOUSE GRILL 6 -->
    <aside class="w-64 bg-slate-950 text-slate-400 flex flex-col justify-between border-r border-slate-900 shrink-0">
        <div>
            <!-- Header / Logo Extraído del Anuncio -->
            <div class="p-6 border-b border-slate-900/60 flex items-center gap-3">
                <div class="h-9 w-9 bg-linear-to-br from-red-600 to-amber-500 rounded-xl flex items-center justify-center shadow-lg shadow-red-950/50 text-lg">
                    🔥
                </div>
                <div>
                    <h1 class="font-black text-sm tracking-tighter text-white uppercase leading-tight">House Grill 6</h1>
                    <p class="text-[10px] text-red-500 font-bold uppercase tracking-widest">Panel de Control</p>
                </div>
            </div>

            <!-- Navegación Conectada con tu Router hashchange -->
            <nav class="p-4 space-y-1.5" id="sidebar-nav">
                <button data-view="estadisticas" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-sm font-semibold transition-all duration-200 text-slate-400 hover:bg-slate-900/60 hover:text-white cursor-pointer group">
                    <span class="text-base transition-transform group-hover:scale-110">📊</span> 
                    <span>Estadísticas</span>
                </button>
                <button data-view="pedidos" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-sm font-semibold transition-all duration-200 text-slate-400 hover:bg-slate-900/60 hover:text-white cursor-pointer group">
                    <span class="text-base transition-transform group-hover:scale-110">📝</span> 
                    <span>Pedidos</span>
                </button>
                <button data-view="historial" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-sm font-semibold transition-all duration-200 text-slate-400 hover:bg-slate-900/60 hover:text-white cursor-pointer group">
                    <span class="text-base transition-transform group-hover:scale-110">⏳</span> 
                    <span>Historial</span>
                </button>
                <button data-view="inventario" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-sm font-semibold transition-all duration-200 text-slate-400 hover:bg-slate-900/60 hover:text-white cursor-pointer group">
                    <span class="text-base transition-transform group-hover:scale-110">📦</span> 
                    <span>Inventario</span>
                </button>
            </nav>
        </div>

        <!-- Footer Sidebar -->
        <div class="p-4 border-t border-slate-900 text-[10px] font-mono text-red-600/60 text-center uppercase tracking-widest bg-slate-950/40">
            Modo Interno • Parrilla
        </div>
    </aside>

    <!-- CONTENEDOR PRINCIPAL DINÁMICO (Ajustado a bg-slate-950) -->
    <main id="app" class="flex-1 flex flex-col min-w-0 overflow-y-auto bg-slate-950 p-8 custom-scrollbar">
        <!-- El contenido modular de las vistas se inyectará aquí mediante main.js de forma limpia -->
    </main>

    <!-- Script Orquestador Principal (SPA Router) -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
