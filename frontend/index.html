<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-50 select-none">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Grill 6 - Panel de Control Interno</title>

    <!-- El archivo CSS de Tailwind se procesará mediante Vite -->
     <link rel="icon" type="image/png" href="/isotipo.png">
    <link rel="stylesheet" href="/src/style.css">
    <style>
        /* Scrollbar personalizado estético para conservar la inmersión de House Grill */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #991b1b; /* Rojo quemado para el scroll */
            border-radius: 9999px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #dc2626; 
        }
    </style>
</head>
<body class="h-full bg-slate-50 text-slate-900 antialiased flex overflow-hidden">

    <!-- SIDEBAR FIJO CON ESTÉTICA HOUSE GRILL 6 (estilo comanda de cocina) -->
        <aside class="w-64 shrink-0 flex flex-col justify-between bg-linear-to-b from-[#090909] via-[#121212] to-[#1A1A1A] text-slate-300 border-r border-white/5 shadow-[8px_0_30px_rgba(0,0,0,0.45)]">
            <div>
                <div class="pt-6 pb-5 px-6 flex flex-col items-center text-center">
                    <div class="relative h-32 w-32">
                        <div class="absolute inset-0 rounded-full bg-linear-to-br from-orange-500/35 via-red-500/30 to-transparent blur-3xl"></div>
                        <img src="/logo-house-grill.png" alt="House Grill 6" class="relative h-32 w-32 object-contain drop-shadow-[0_0_28px_rgba(239,68,68,.35)] transition duration-500 hover:scale-105" />
                    </div>
                    <h1 class="mt-3 text-white text-base font-black uppercase tracking-wide">Panel · Comanda</h1>
                </div>
                <div class="mx-6 border-t border-white/5"></div>
                <nav class="px-4 py-5 space-y-2 font-medium" id="sidebar-nav">
                    <button data-view="estadisticas" class="nav-btn group relative overflow-hidden flex items-center w-full gap-4 rounded-xl px-4 py-3 text-left transition-all duration-300 text-slate-400 hover:bg-slate-900/60 hover:translate-x-1 hover:text-white">
                        <span class="absolute left-0 top-2 bottom-2 w-1 rounded-r-full bg-red-500 opacity-0 group-hover:opacity-100 transition"></span>
                        <span class="text-xl transition-transform duration-300 group-hover:scale-110">📊</span>
                        <span class="text-sm tracking-wide">Estadísticas</span>
                    </button>
                    <button data-view="pedidos" class="nav-btn group relative overflow-hidden flex items-center w-full gap-4 rounded-xl px-4 py-3 text-left transition-all duration-300 text-slate-400 hover:bg-slate-900/60 hover:translate-x-1 hover:text-white">
                        <span class="absolute left-0 top-2 bottom-2 w-1 rounded-r-full bg-red-500 opacity-0 group-hover:opacity-100 transition"></span>
                        <span class="text-xl transition-transform duration-300 group-hover:scale-110">🍔</span>
                        <span class="text-sm tracking-wide">Pedidos</span>
                    </button>
                    <button data-view="historial" class="nav-btn group relative overflow-hidden flex items-center w-full gap-4 rounded-xl px-4 py-3 text-left transition-all duration-300 text-slate-400 hover:bg-slate-900/60 hover:translate-x-1 hover:text-white">
                        <span class="absolute left-0 top-2 bottom-2 w-1 rounded-r-full bg-red-500 opacity-0 group-hover:opacity-100 transition"></span>
                        <span class="text-xl transition-transform duration-300 group-hover:scale-110">🧾</span>
                        <span class="text-sm tracking-wide">Historial</span>
                    </button>
                    <button data-view="inventario" class="nav-btn group relative overflow-hidden flex items-center w-full gap-4 rounded-xl px-4 py-3 text-left transition-all duration-300 text-slate-400 hover:bg-slate-900/60 hover:translate-x-1 hover:text-white">
                        <span class="absolute left-0 top-2 bottom-2 w-1 rounded-r-full bg-red-500 opacity-0 group-hover:opacity-100 transition"></span>
                        <span class="text-xl transition-transform duration-300 group-hover:scale-110">📦</span>
                        <span class="text-sm tracking-wide">Inventario</span>
                    </button>
                </nav>
            </div>
            <div class="p-4 border-t border-slate-900 bg-slate-950/40 space-y-3">
                <!-- Selector de idioma -->
                <div id="lang-switcher" class="flex gap-1 bg-slate-900/60 border border-slate-900 rounded-lg p-1">
                    <button data-lang="es" class="lang-btn flex-1 text-[10px] font-black uppercase tracking-widest py-1.5 rounded-md transition-colors cursor-pointer">ES</button>
                    <button data-lang="en" class="lang-btn flex-1 text-[10px] font-black uppercase tracking-widest py-1.5 rounded-md transition-colors cursor-pointer">EN</button>
                </div>
                <p class="text-[10px] font-mono text-red-600/60 text-center uppercase tracking-widest" data-i18n="app.footer">Modo Interno • Parrilla</p>
            </div>
        </aside>

    <!-- CONTENEDOR PRINCIPAL DINÁMICO (Ajustado a bg-slate-950) -->
    <main id="app" class="flex-1 flex flex-col min-w-0 overflow-y-auto custom-scrollbar">
        <!-- El contenido modular de las vistas se inyectará aquí mediante main.js de forma limpia -->
    </main>

    <!-- Script Orquestador Principal (SPA Router) -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
